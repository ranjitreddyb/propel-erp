# ============================================================
# Nginx Configuration — propelerp.wisewit.ai
# ============================================================

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain application/json application/javascript text/css;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # ─── Redirect HTTP → HTTPS ──────────────────────────────
  server {
    listen 80;
    server_name propelerp.wisewit.ai;
    return 301 https://$host$request_uri;
  }

  # ─── Main HTTPS Server ──────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name propelerp.wisewit.ai;

    # SSL — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/propelerp.wisewit.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/propelerp.wisewit.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Frontend (Next.js) ─────────────────────────────
    location / {
      proxy_pass         http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ─── Backend API ────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://backend:4000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ─── Auth endpoints — stricter rate limit ───────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://backend:4000;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── WebSocket (real-time notifications) ────────────
    location /socket.io/ {
      proxy_pass         http://backend:4000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
    }

    # ─── AI Engine ──────────────────────────────────────
    location /ai/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://ai-engine:8000/api/v1/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 120s;   # AI responses can take longer
    }

    # ─── Static assets caching ──────────────────────────
    location /_next/static/ {
      proxy_pass http://frontend:3000;
      expires    1y;
      add_header Cache-Control "public, immutable";
    }

    # ─── Health check (public) ──────────────────────────
    location /health {
      proxy_pass http://backend:4000/health;
      access_log off;
    }
  }
}

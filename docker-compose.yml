version: '3.9'

# ════════════════════════════════════════════════════════════
# PropelERP Docker Compose - Using UNIQUE PORTS to avoid conflicts
# Frontend: 9300, Backend: 9400, AI: 9800
# PostgreSQL: 9532, Redis: 9637, MongoDB: 9701, pgAdmin: 9505
# ════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: propel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: propel_erp
      POSTGRES_USER: propel_user
      POSTGRES_PASSWORD: propel_pass
    volumes:
      - propel_postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    ports:
      - "9532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propel_user -d propel_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: propel_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - propel_redis_data:/data
    ports:
      - "9637:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: propel_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: propel_docs
    volumes:
      - propel_mongo_data:/data/db
    ports:
      - "9701:27017"

  # ─── pgAdmin (DB Management UI) ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: propel_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wisewit.ai
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "9505:80"
    depends_on:
      - postgres

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: propel_backend
    restart: unless-stopped
    env_file: .env.docker
    environment:
      DATABASE_URL: postgresql://propel_user:propel_pass@postgres:5432/propel_erp
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://mongodb:27017/propel_docs
      PORT: 4000
    ports:
      - "9400:4000"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── AI Engine ────────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: ../infra/docker/Dockerfile.ai
    container_name: propel_ai
    restart: unless-stopped
    env_file: .env.docker
    environment:
      DATABASE_URL: postgresql://propel_user:propel_pass@postgres:5432/propel_erp
    ports:
      - "9800:8000"
    volumes:
      - ./ai-engine:/app
    depends_on:
      - postgres

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: propel_frontend
    restart: unless-stopped
    env_file: .env.docker
    environment:
      NEXT_PUBLIC_API_URL: https://propelerp.wisewit.ai
      NEXT_PUBLIC_AI_URL: https://propelerp.wisewit.ai/ai
      PORT: 3000
    ports:
      - "9300:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  propel_postgres_data:
  propel_redis_data:
  propel_mongo_data:

networks:
  default:
    name: propel_network

version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: propel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: propel_erp
      POSTGRES_USER: propel_user
      POSTGRES_PASSWORD: propel_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propel_user -d propel_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: propel_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: propel_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: propel_docs
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  # ─── pgAdmin (DB Management UI) ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: propel_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wisewit.ai
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: propel_backend
    restart: unless-stopped
    env_file: .env.docker
    environment:
      DATABASE_URL: postgresql://propel_user:propel_pass@postgres:5432/propel_erp
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://mongodb:27017/propel_docs
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  # ─── AI Engine ────────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: ../infra/docker/Dockerfile.ai
    container_name: propel_ai
    restart: unless-stopped
    env_file: .env.docker
    environment:
      DATABASE_URL: postgresql://propel_user:propel_pass@postgres:5432/propel_erp
    ports:
      - "8001:8000"
    volumes:
      - ./ai-engine:/app
    depends_on:
      - postgres

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: propel_frontend
    restart: unless-stopped
    env_file: .env.docker
    environment:
      NEXT_PUBLIC_API_URL: https://propelerp.wisewit.ai
      NEXT_PUBLIC_AI_URL: https://propelerp.wisewit.ai/ai
      NEXTAUTH_URL: https://propelerp.wisewit.ai
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    command: npm run dev

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: propel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  default:
    name: propel_network
